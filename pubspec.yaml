name: smart_planner
description: Smart Planner & Trip Assistant — personal scheduler with AI-powered trip recommendations.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Backend / Auth
  supabase_flutter: ^2.5.3

  # Networking (optional HTTP helper)
  http: ^1.2.1

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # Firebase Cloud Messaging (FCM) — placeholder setup
  firebase_messaging: ^15.1.3
  firebase_core: ^3.4.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
